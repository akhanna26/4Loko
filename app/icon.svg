<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Cream background -->
  <rect width="64" height="64" rx="10" fill="#f5f1e6"/>

  <!-- Golf ball -->
  <circle cx="32" cy="32" r="22" fill="#ffffff" stroke="#2a4636" stroke-width="2"/>

  <!-- Subtle dimple texture (a few representative dimples) -->
  <g fill="#2a4636" opacity="0.08">
    <circle cx="22" cy="22" r="1.2"/>
    <circle cx="28" cy="20" r="1.2"/>
    <circle cx="36" cy="20" r="1.2"/>
    <circle cx="42" cy="22" r="1.2"/>
    <circle cx="20" cy="28" r="1.2"/>
    <circle cx="44" cy="28" r="1.2"/>
    <circle cx="20" cy="36" r="1.2"/>
    <circle cx="44" cy="36" r="1.2"/>
    <circle cx="22" cy="42" r="1.2"/>
    <circle cx="28" cy="44" r="1.2"/>
    <circle cx="36" cy="44" r="1.2"/>
    <circle cx="42" cy="42" r="1.2"/>
    <circle cx="32" cy="18" r="1.2"/>
    <circle cx="32" cy="46" r="1.2"/>
    <circle cx="18" cy="32" r="1.2"/>
    <circle cx="46" cy="32" r="1.2"/>
  </g>

  <!-- LOKO branding (top) -->
  <text x="32" y="29" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif"
        font-size="9" font-weight="800"
        fill="#2a4636" letter-spacing="0.5">LOKO</text>

  <!-- Number 4 (bottom) -->
  <text x="32" y="44" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif"
        font-size="13" font-weight="800"
        fill="#b3322f">4</text>
</svg>